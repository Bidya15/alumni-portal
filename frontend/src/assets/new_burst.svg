<svg width="120" height="55" viewBox="0 0 120 55" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur" />
      <feOffset dx="0" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Hand-crafted horizontal 120x55 Starburst -->
  <polygon fill="#ef4444" points="115,27.5 105,38 108,50 95,45 85,54 72,45 60,54 48,45 35,54 25,45 12,50 15,38 5,27.5 15,17 12,5 25,10 35,1 48,10 60,1 72,10 85,1 95,10 108,5 105,17" filter="url(#glow)" />
  <!-- Bold White Text -->
  <text x="60" y="32.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="20" fill="white" text-anchor="middle" dominant-baseline="middle" style="text-shadow: 0 1px 2px rgba(0,0,0,0.2);">NEW</text>
</svg>
