spring.application.name=alumni-portal

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/alumni_portal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security Configuration
jwt.secret=${JWT_SECRET:9alL469hFwpLBwtQwVmph9kmFAbSasAYU8J+wQjVvVo=}
jwt.expiration=86400000

# Increase upload limits for Base64 images
server.tomcat.max-http-post-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Get your API key at https://app.sendgrid.com/settings/api_keys
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:noreply@alumniportal.com}

# Google Auth
google.client.id=784994239236-39fsdl63ngchrlje84bl9kpoborsjecj.apps.googleusercontent.com
