spring.application.name=alumni-portal

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/alumni_portal
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security Configuration
jwt.secret=9a6747556f8f118acc29910d680a6d59b2075782782e2133cecfc4811f584e03004e0394348
jwt.expiration=86400000

# Increase upload limits for Base64 images
server.tomcat.max-http-post-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

