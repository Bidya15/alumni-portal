services:
  # 1. PostgreSQL Database
  - type: db
    name: alumni-db
    databaseName: alumni_portal
    user: postgres
    plan: free

  # 2. Spring Boot Backend Web Service
  - type: web
    name: alumni-backend
    env: docker
    plan: starter
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DATABASE_URL_WITHOUT_PARAMS}?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: alumni-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: alumni-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://alumni-frontend.onrender.com # Change to your actual frontend Render URL

  # 3. React Frontend Static Site (Free)
  - type: web
    name: alumni-frontend
    env: static
    plan: free
    publishPath: frontend/dist
    buildCommand: cd frontend && npm install && npm run build
    envVars:
      - key: VITE_API_BASE_URL
        value: https://alumni-backend.onrender.com/api # Change to your actual backend Render URL
    # Rule for Single Page Application routing (similar to try_files in Nginx)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
