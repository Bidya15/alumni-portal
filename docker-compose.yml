services:
  db:
    image: postgres:15-alpine
    container_name: alumni-db
    environment:
      POSTGRES_DB: alumni_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    # Database port is internal to docker container network for production security.
    # Uncomment the ports mapping below if you need external access to the DB host during dev.
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: alumni-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/alumni_portal
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-your_very_long_random_secret_here}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://frontend}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: alumni-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
